name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Allow the release job to create GitHub Releases and upload assets.
permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# CI has no access to the private moqxr sibling checkout, so every job builds the
# mock publisher adapter (MOQ2TS_BUILD_WITH_MOCK_MOQXR=ON). The full codec stack
# (Qt6 + ffmpeg/libav + openh264 + opus) is installed so the published binaries
# support in-process capture and H.264/AAC/Opus transcoding.

jobs:
  linux:
    name: linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config file imagemagick wget \
            qt6-base-dev qt6-base-dev-tools libgl1-mesa-dev \
            libopenh264-dev \
            libavcodec-dev libavdevice-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            libopus-dev

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOQ2TS_BUILD_WITH_MOCK_MOQXR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Source guards
        run: |
          for f in tests/*-guards.sh; do
            echo "== $f =="
            bash "$f"
          done

      - name: Package AppImage
        env:
          # Extract-and-run avoids needing FUSE on the runner image.
          APPIMAGE_EXTRACT_AND_RUN: 1
          QMAKE: /usr/lib/qt6/bin/qmake6
          # linuxdeploy's appimage plugin names the output after this bare filename.
          OUTPUT: moq2ts-publisher-linux-x86_64.AppImage
        run: |
          set -eux
          DESTDIR="$PWD/AppDir" cmake --install build --prefix /usr
          mkdir -p AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cat > AppDir/usr/share/applications/moq2ts-publisher.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=moq2ts Publisher
          Exec=moq2ts-publisher
          Icon=moq2ts-publisher
          Categories=AudioVideo;
          Terminal=false
          EOF
          convert -size 256x256 xc:'#1565c0' \
            AppDir/usr/share/icons/hicolor/256x256/apps/moq2ts-publisher.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt \
            --desktop-file AppDir/usr/share/applications/moq2ts-publisher.desktop \
            --output appimage
          mkdir -p dist
          mv "$OUTPUT" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: moq2ts-linux
          path: dist/*.AppImage
          if-no-files-found: error

  macos:
    name: macos (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install qt ffmpeg openh264 opus pkg-config cmake ninja

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOQ2TS_BUILD_WITH_MOCK_MOQXR=ON
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt);$(brew --prefix)"

      - name: Build
        run: cmake --build build --parallel

      - name: Package app bundle
        run: |
          set -eux
          APP="build/moq2ts-publisher.app"
          "$(brew --prefix qt)/bin/macdeployqt" "$APP" -verbose=1
          mkdir -p dist
          ditto -c -k --keepParent "$APP" dist/moq2ts-publisher-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: moq2ts-macos
          path: dist/moq2ts-publisher-macos.zip
          if-no-files-found: error

  windows:
    name: windows (x86_64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-openh264
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-opus

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOQ2TS_BUILD_WITH_MOCK_MOQXR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          set -eux
          mkdir -p dist/moq2ts-publisher
          cp build/moq2ts-publisher.exe dist/moq2ts-publisher/
          WINDEPLOYQT="$(command -v windeployqt6 || command -v windeployqt-qt6 || command -v windeployqt)"
          "$WINDEPLOYQT" --release --no-translations --compiler-runtime \
            dist/moq2ts-publisher/moq2ts-publisher.exe
          # windeployqt copies the Qt runtime/plugins but not ffmpeg/openh264/opus;
          # resolve the remaining MinGW DLL dependencies via ldd and copy them in.
          ldd dist/moq2ts-publisher/moq2ts-publisher.exe \
            | awk '/mingw64/ {print $3}' \
            | while read -r dll; do cp -n "$dll" dist/moq2ts-publisher/ || true; done

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/moq2ts-publisher/* -DestinationPath dist/moq2ts-publisher-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: moq2ts-windows
          path: dist/moq2ts-publisher-windows.zip
          if-no-files-found: error

  release:
    name: release
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List assets
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
