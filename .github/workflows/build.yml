name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Allow the release job to create GitHub Releases and upload assets.
permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned openmoq publisher SDK release (mondain/moqxr, public). Bump to adopt a
  # newer SDK. Each platform archive ships include/ + lib/ of static libraries so
  # moq2ts links the real publisher (MOQ2TS_BUILD_WITH_MOCK_MOQXR=OFF) and the
  # produced binaries can connect to a real relay. OpenSSL is a system dependency.
  MOQXR_VERSION: v0.3.2

jobs:
  linux:
    name: linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config file imagemagick wget \
            qt6-base-dev qt6-base-dev-tools libgl1-mesa-dev \
            libssl-dev \
            libopenh264-dev \
            libavcodec-dev libavdevice-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            libopus-dev

      - name: Fetch moqxr SDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          gh release download "$MOQXR_VERSION" --repo mondain/moqxr \
            --pattern '*Linux*' --dir "$RUNNER_TEMP"
          mkdir -p "$RUNNER_TEMP/moqxr-sdk"
          tar xzf "$RUNNER_TEMP"/openmoq-publisher-*-Linux.tar.gz \
            -C "$RUNNER_TEMP/moqxr-sdk" --strip-components=1
          echo "MOQXR_SDK_DIR=$RUNNER_TEMP/moqxr-sdk" >> "$GITHUB_ENV"

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOQ2TS_BUILD_WITH_MOCK_MOQXR=OFF
          -DMOQXR_SDK_DIR="$MOQXR_SDK_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Source guards
        run: |
          for f in tests/*-guards.sh; do
            echo "== $f =="
            bash "$f"
          done

      - name: Package AppImage
        env:
          # Extract-and-run avoids needing FUSE on the runner image.
          APPIMAGE_EXTRACT_AND_RUN: 1
          QMAKE: /usr/lib/qt6/bin/qmake6
          # linuxdeploy's appimage plugin names the output after this bare filename.
          OUTPUT: moq2ts-publisher-linux-x86_64.AppImage
        run: |
          set -eux
          DESTDIR="$PWD/AppDir" cmake --install build --prefix /usr
          mkdir -p AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cat > AppDir/usr/share/applications/moq2ts-publisher.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=moq2ts Publisher
          Exec=moq2ts-publisher
          Icon=moq2ts-publisher
          Categories=AudioVideo;
          Terminal=false
          EOF
          convert -size 256x256 xc:'#1565c0' \
            AppDir/usr/share/icons/hicolor/256x256/apps/moq2ts-publisher.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt \
            --desktop-file AppDir/usr/share/applications/moq2ts-publisher.desktop \
            --output appimage
          mkdir -p dist
          mv "$OUTPUT" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: moq2ts-linux
          path: dist/*.AppImage
          if-no-files-found: error

  macos:
    name: macos (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install qt ffmpeg openh264 opus openssl@3 pkg-config cmake ninja

      - name: Fetch moqxr SDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          gh release download "$MOQXR_VERSION" --repo mondain/moqxr \
            --pattern '*macOS*' --dir "$RUNNER_TEMP"
          mkdir -p "$RUNNER_TEMP/moqxr-sdk"
          tar xzf "$RUNNER_TEMP"/openmoq-publisher-*-macOS.tar.gz \
            -C "$RUNNER_TEMP/moqxr-sdk" --strip-components=1
          echo "MOQXR_SDK_DIR=$RUNNER_TEMP/moqxr-sdk" >> "$GITHUB_ENV"

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMOQ2TS_BUILD_WITH_MOCK_MOQXR=OFF
          -DMOQXR_SDK_DIR="$MOQXR_SDK_DIR"
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt);$(brew --prefix)"
          -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"

      - name: Build
        run: cmake --build build --parallel

      - name: Package app bundle
        run: |
          set -eux
          APP="build/moq2ts-publisher.app"
          "$(brew --prefix qt)/bin/macdeployqt" "$APP" -verbose=1
          mkdir -p dist
          ditto -c -k --keepParent "$APP" dist/moq2ts-publisher-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: moq2ts-macos
          path: dist/moq2ts-publisher-macos.zip
          if-no-files-found: error

  windows:
    name: windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # moqxr ships an MSVC-built Windows SDK, so moq2ts must also build with MSVC
      # (the MinGW ABI is incompatible). Qt comes from the official MSVC binaries
      # and the codec stack from vcpkg.
      - name: Install Qt (MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtmultimedia
          cache: true

      - name: Install codecs (vcpkg)
        shell: pwsh
        run: |
          # pkg-config lets moq2ts's pkg_check_modules locate the vcpkg ffmpeg.
          choco install pkgconfiglite --no-progress -y
          vcpkg install --triplet x64-windows `
            "ffmpeg[avcodec,avformat,avdevice,swresample,swscale]" `
            openh264 opus

      - name: Fetch moqxr SDK (MSVC)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download $env:MOQXR_VERSION --repo mondain/moqxr `
            --pattern '*Windows*' --dir $env:RUNNER_TEMP
          $zip = Get-ChildItem "$env:RUNNER_TEMP\openmoq-publisher-*-Windows.zip" | Select-Object -First 1
          Expand-Archive $zip.FullName -DestinationPath "$env:RUNNER_TEMP\moqxr-extract" -Force
          $inner = Get-ChildItem "$env:RUNNER_TEMP\moqxr-extract" -Directory | Select-Object -First 1
          "MOQXR_SDK_DIR=$($inner.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          $env:PKG_CONFIG_PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\pkgconfig"
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DMOQ2TS_BUILD_WITH_MOCK_MOQXR=OFF `
            -DMOQXR_SDK_DIR="$env:MOQXR_SDK_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          $stage = "dist\moq2ts-publisher"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build\Release\moq2ts-publisher.exe $stage\
          # Bundle the Qt runtime/plugins.
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations --compiler-runtime "$stage\moq2ts-publisher.exe"
          # Bundle the vcpkg codec DLLs (ffmpeg/openh264/opus and their deps).
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\*.dll" $stage\ -Force

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/moq2ts-publisher/* -DestinationPath dist/moq2ts-publisher-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: moq2ts-windows
          path: dist/moq2ts-publisher-windows.zip
          if-no-files-found: error

  release:
    name: release
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List assets
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
